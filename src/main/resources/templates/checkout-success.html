<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Razorpay Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1f36 0%, #0d1117 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .result-container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            text-align: center;
            padding: 40px 24px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        .success-title {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .success-message {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .payment-details {
            background: #f9fafb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 13px;
            color: #6b7280;
        }

        .detail-value {
            font-size: 13px;
            font-weight: 500;
            color: #111827;
            font-family: monospace;
        }

        .amount-row .detail-value {
            font-size: 18px;
            font-weight: 700;
            color: #22c55e;
        }

        .signature-box {
            background: #1e293b;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }

        .signature-label {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .signature-value {
            font-family: monospace;
            font-size: 11px;
            color: #22c55e;
            word-break: break-all;
        }

        .action-btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        .simulator-badge {
            display: inline-block;
            background: #dcfce7;
            color: #16a34a;
            font-size: 10px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="result-container">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 class="success-title">Payment Successful!</h1>
        <p class="success-message">Your payment has been processed successfully.</p>

        <div class="payment-details">
            <div class="detail-row amount-row">
                <span class="detail-label">Amount Paid</span>
                <span class="detail-value" th:text="${amount}">₹100.00</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Order ID</span>
                <span class="detail-value" th:text="${order.id}">order_xxx</span>
            </div>
            <div class="detail-row" th:if="${payment != null}">
                <span class="detail-label">Payment ID</span>
                <span class="detail-value" th:text="${payment.id}">pay_xxx</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="detail-value" style="color: #22c55e;">PAID</span>
            </div>
        </div>

        <div class="signature-box" th:if="${signature != null}">
            <div class="signature-label">Razorpay Signature (for verification)</div>
            <div class="signature-value" th:text="${signature}">signature_xxx</div>
        </div>

        <a href="/admin" class="action-btn">View in Dashboard</a>

        <div class="simulator-badge">🧪 SIMULATED PAYMENT</div>
    </div>

    <script th:inline="javascript">
        // Send payment success message to parent window (for popup integration)
        if (window.opener) {
            const paymentData = {
                type: 'razorpay_payment_success',
                razorpay_order_id: /*[[${order.id}]]*/ 'order_xxx',
                razorpay_payment_id: /*[[${payment != null ? payment.id : ''}]]*/ '',
                razorpay_signature: /*[[${signature}]]*/ ''
            };

            // Send message to parent window
            window.opener.postMessage(paymentData, '*');

            // Show closing message
            const container = document.querySelector('.success-message');
            if (container) {
                setTimeout(() => {
                    container.textContent = 'Returning to application...';
                }, 1500);
            }

            // Close popup after 2 seconds
            setTimeout(() => {
                window.close();
            }, 2000);
        }
    </script>
</body>
</html>
